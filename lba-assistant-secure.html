<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LBA AI Assistant</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --lba-primary:#1a4b8c;
    --lba-secondary:#d4a017;
    --lba-accent:#e8f0fb;
    --lba-bg:#ffffff;
    --lba-text:#1c2b3a;
    --lba-muted:#6b7e93;
    --lba-shadow:0 8px 32px rgba(26,75,140,.18);
    --lba-radius:20px;
    --lba-font:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  #lba-launcher{
    position:fixed;bottom:24px;right:24px;z-index:9998;
    width:60px;height:60px;border-radius:50%;
    background:var(--lba-primary);border:none;cursor:pointer;
    box-shadow:var(--lba-shadow);
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s,box-shadow .2s;outline:none;
  }
  #lba-launcher:hover{transform:scale(1.08);}
  #lba-launcher svg{width:28px;height:28px;fill:#fff;}
  #lba-launcher .icon-close{display:none;}
  #lba-launcher.open .icon-chat{display:none;}
  #lba-launcher.open .icon-close{display:block;}
  #lba-launcher::after{
    content:'';position:absolute;top:4px;right:4px;
    width:12px;height:12px;background:var(--lba-secondary);
    border-radius:50%;border:2px solid #fff;
    animation:lba-pulse 2.4s infinite;
  }
  #lba-launcher.open::after{display:none;}
  @keyframes lba-pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.7;}}
  #lba-window{
    position:fixed;bottom:96px;right:24px;z-index:9999;
    width:380px;max-width:calc(100vw - 32px);
    height:580px;max-height:calc(100vh - 120px);
    background:var(--lba-bg);border-radius:var(--lba-radius);
    box-shadow:var(--lba-shadow);
    display:flex;flex-direction:column;overflow:hidden;
    transform:scale(.92) translateY(16px);opacity:0;pointer-events:none;
    transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s;
    font-family:var(--lba-font);
  }
  #lba-window.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
  #lba-header{background:var(--lba-primary);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  #lba-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--lba-secondary);display:flex;align-items:center;justify-content:center;}
  #lba-avatar img{width:100%;height:100%;object-fit:cover;}
  #lba-header-info{flex:1;min-width:0;}
  #lba-header-name{color:#fff;font-weight:700;font-size:15px;line-height:1.2;}
  #lba-header-status{color:#a8c8f8;font-size:12px;display:flex;align-items:center;gap:4px;}
  #lba-status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;}
  #lba-header-close{background:none;border:none;cursor:pointer;color:#a8c8f8;padding:4px;border-radius:6px;display:flex;align-items:center;transition:color .15s;}
  #lba-header-close:hover{color:#fff;}
  #lba-header-close svg{width:18px;height:18px;}
  #lba-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
  #lba-messages::-webkit-scrollbar{width:4px;}
  #lba-messages::-webkit-scrollbar-thumb{background:#d0dae8;border-radius:4px;}
  .lba-msg{display:flex;flex-direction:column;max-width:86%;animation:lba-fadeup .2s ease;}
  @keyframes lba-fadeup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .lba-msg.user{align-self:flex-end;align-items:flex-end;}
  .lba-msg.bot{align-self:flex-start;align-items:flex-start;}
  .lba-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word;}
  .lba-msg.user .lba-bubble{background:var(--lba-primary);color:#fff;border-bottom-right-radius:4px;}
  .lba-msg.bot .lba-bubble{background:var(--lba-accent);color:var(--lba-text);border-bottom-left-radius:4px;}
  .lba-bubble a{color:var(--lba-primary);}
  .lba-msg.user .lba-bubble a{color:#a8d4ff;}
  .lba-bubble strong{font-weight:700;}
  .lba-bubble ul,.lba-bubble ol{padding-left:18px;margin:4px 0;}
  .lba-bubble li{margin:2px 0;}
  .lba-bubble p{margin:4px 0;}
  .lba-bubble p:first-child{margin-top:0;}
  .lba-bubble p:last-child{margin-bottom:0;}
  .lba-time{font-size:11px;color:var(--lba-muted);margin-top:3px;padding:0 4px;}
  #lba-typing{display:none;align-self:flex-start;}
  #lba-typing.visible{display:flex;}
  #lba-typing .lba-bubble{display:flex;gap:5px;align-items:center;padding:12px 16px;}
  .lba-dot{width:7px;height:7px;border-radius:50%;background:var(--lba-muted);animation:lba-bounce .9s infinite;}
  .lba-dot:nth-child(2){animation-delay:.15s;}
  .lba-dot:nth-child(3){animation-delay:.30s;}
  @keyframes lba-bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
  #lba-quick{padding:0 16px 8px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;}
  .lba-qr{background:none;border:1.5px solid var(--lba-primary);color:var(--lba-primary);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--lba-font);transition:background .15s,color .15s;}
  .lba-qr:hover{background:var(--lba-primary);color:#fff;}
  #lba-voice-status{font-size:11px;color:#ef4444;text-align:center;padding:0 14px 4px;display:none;flex-shrink:0;}
  #lba-voice-status.visible{display:block;}
  #lba-inputbar{padding:10px 14px;border-top:1px solid #e4ecf7;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
  #lba-input{flex:1;border:1.5px solid #d0dae8;border-radius:12px;padding:9px 12px;font-size:14px;font-family:var(--lba-font);color:var(--lba-text);resize:none;line-height:1.4;max-height:100px;overflow-y:auto;outline:none;transition:border-color .15s;}
  #lba-input:focus{border-color:var(--lba-primary);}
  #lba-input::placeholder{color:#9db3c8;}
  #lba-voice{width:36px;height:36px;border-radius:50%;background:var(--lba-accent);border:1.5px solid #d0dae8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
  #lba-voice:hover{background:#d0dae8;}
  #lba-voice.listening{background:#fee2e2;border-color:#f87171;animation:lba-pulse 1s infinite;}
  #lba-voice svg{width:16px;height:16px;fill:var(--lba-primary);}
  #lba-voice.listening svg{fill:#ef4444;}
  #lba-send{width:38px;height:38px;border-radius:50%;background:var(--lba-primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;}
  #lba-send:hover{background:#163d75;}
  #lba-send:active{transform:scale(.92);}
  #lba-send:disabled{background:#b0c4de;cursor:not-allowed;}
  #lba-send svg{width:18px;height:18px;fill:#fff;}
  #lba-footer{padding:6px 14px 10px;text-align:center;font-size:11px;color:var(--lba-muted);flex-shrink:0;}
  #lba-footer a{color:var(--lba-muted);text-decoration:none;}
  #lba-footer a:hover{text-decoration:underline;}
  @media(max-width:440px){
    #lba-window{right:0;left:0;bottom:0;width:100%;max-width:100%;height:72vh;max-height:72vh;border-radius:var(--lba-radius) var(--lba-radius) 0 0;}
    #lba-launcher{bottom:18px;right:18px;}
  }
</style>
</head>
